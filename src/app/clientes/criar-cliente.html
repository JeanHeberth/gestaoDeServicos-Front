<div class="page">
  <div class="page-header"><h1>Criar Cliente</h1></div>
  <div class="card">
    <form (ngSubmit)="salvar()" #clienteForm="ngForm" autoFillGuard (cleared)="onCleared()" autocomplete="off">
      <label>
        Nome:
        <input type="text" [(ngModel)]="cliente.nome" [ngModelOptions]="{standalone:true}" required autocomplete="off" />
      </label>

      <label>
        Documento:
        <input data-testid="documento-input" type="text" [(ngModel)]="cliente.documento" [ngModelOptions]="{standalone:true}" required autocomplete="off" />
      </label>

      <label>
        Email:
        <input data-testid="email-input" type="email" [(ngModel)]="cliente.email" [ngModelOptions]="{standalone:true}" required autocomplete="off" />
      </label>

      <label>
        Telefone:
        <input data-testid="telefone-input" type="text" [(ngModel)]="cliente.telefone" [ngModelOptions]="{standalone:true}" required autocomplete="off" />
      </label>

      <div class="actions">
        <button class="btn-primary" type="submit" [disabled]="clienteForm.invalid">Salvar</button>
      </div>
    </form>
  </div>
</div>

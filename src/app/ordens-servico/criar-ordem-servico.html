<div class="page">
  <div class="page-header"><h1>Criar Ordem de Serviço</h1></div>
  <div class="card">
    <form (ngSubmit)="salvar()" #osForm="ngForm" autoFillGuard (cleared)="onCleared()" autocomplete="off">
      <label>
        Descrição:
        <input type="text" [(ngModel)]="ordemServico.descricao" [ngModelOptions]="{standalone:true}" required autocomplete="off" />
      </label>

      <label>
        Cliente:
        <select [(ngModel)]="ordemServico.clienteId" [ngModelOptions]="{standalone:true}" required>
          <option *ngFor="let cliente of clientes" [value]="cliente.id">{{ cliente.nome }}</option>
        </select>
      </label>

      <label>
        Status:
        <select [(ngModel)]="ordemServico.status" [ngModelOptions]="{standalone:true}" required>
          <option value="ABERTA">Aberta</option>
          <option value="FECHADA">Fechada</option>
        </select>
      </label>

      <div class="actions"><button class="btn-primary" type="submit" [disabled]="osForm.invalid">Salvar</button></div>
    </form>
  </div>
</div>

<div class="page">
  <div class="page-header">
    <h1>Criar Usuário</h1>
  </div>
  <div class="card">
    <form (ngSubmit)="salvar()" #usuarioForm="ngForm" autoFillGuard (cleared)="onCleared()" autocomplete="off">
      <label>
        Nome:
        <input type="text" [(ngModel)]="usuario.nome" [ngModelOptions]="{standalone:true}" required autocomplete="off" />
      </label>
      <label>
        Email:
        <input data-testid="email-input" type="email" [(ngModel)]="usuario.email" [ngModelOptions]="{standalone:true}" required autocomplete="off" />
      </label>
      <label>
        Senha:
        <input data-testid="senha-input" type="password" [(ngModel)]="usuario.senha" [ngModelOptions]="{standalone:true}" required autocomplete="new-password" />
      </label>
      <label>
        Perfil:
        <select [(ngModel)]="usuario.role" [ngModelOptions]="{standalone:true}" required>
          <option value="ADMINISTRADOR">Administrador</option>
          <option value="USUARIO">Usuário</option>
        </select>
      </label>
      <button class="btn-primary" type="submit" [disabled]="usuarioForm.invalid">Salvar</button>
    </form>
  </div>
</div>

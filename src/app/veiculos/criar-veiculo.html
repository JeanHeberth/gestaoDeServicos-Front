<div class="page">
  <div class="page-header">
    <h1>Criar Veículo</h1>
  </div>
  <div class="card">
    <form (ngSubmit)="salvar()" #veiculoForm="ngForm" autoFillGuard (cleared)="onCleared()" autocomplete="off">
      <label>
        Placa:
        <input type="text" [(ngModel)]="veiculo.placa" [ngModelOptions]="{standalone:true}" required minlength="6" maxlength="8" autocomplete="off" />
      </label>

      <label>
        Marca:
        <input type="text" [(ngModel)]="veiculo.marca" [ngModelOptions]="{standalone:true}" required autocomplete="off" />
      </label>

      <label>
        Modelo:
        <input type="text" [(ngModel)]="veiculo.modelo" [ngModelOptions]="{standalone:true}" required autocomplete="off" />
      </label>

      <label>
        Cliente:
        <select [(ngModel)]="veiculo.clienteNome" [ngModelOptions]="{standalone:true}" required>
          <option value="" disabled>Selecione um cliente</option>
          <option *ngFor="let cliente of clientes" [value]="cliente.nome">{{ cliente.nome }}</option>
        </select>
      </label>

      <label>
        Ano:
        <input type="number" [(ngModel)]="veiculo.ano" [ngModelOptions]="{standalone:true}" min="1900" max="2100" autocomplete="off" />
      </label>

      <label>
        Cor:
        <input type="text" [(ngModel)]="veiculo.cor" [ngModelOptions]="{standalone:true}" autocomplete="off" />
      </label>

      <button class="btn-primary" type="submit" [disabled]="veiculoForm.invalid">Salvar</button>
    </form>
  </div>
</div>
